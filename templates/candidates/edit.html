{% extends 'base/base.html' %}

{% block title %}Chỉnh sửa hồ sơ{% endblock %}
{% block page_title %}Chỉnh sửa hồ sơ bệnh nhân{% endblock %}

{% block content %}
<div style="max-width: 640px;">
  <div class="page-header">
    <div>
      <h1>Chỉnh sửa hồ sơ</h1>
      <p>{{ candidate.full_name }}</p>
    </div>
    <a href="{% url 'candidates:detail' candidate.pk %}" class="btn-vc btn-outline-vc">
      <i class="bi bi-arrow-left"></i> Quay lại
    </a>
  </div>

  <div class="vc-card">
    <div class="vc-card-body">
      <form method="post" class="form-vc">
        {% csrf_token %}
        <div class="mb-3">
          <label class="form-label">Họ và tên</label>
          <input type="text" name="full_name" class="form-control" value="{{ candidate.full_name }}" required>
        </div>
        <div class="row g-3 mb-3">
          <div class="col-6">
            <label class="form-label">Ngày sinh</label>
            <input type="date" name="dob" class="form-control" value="{{ candidate.dob|date:'Y-m-d' }}">
          </div>
          <div class="col-6">
            <label class="form-label">Giới tính</label>
            <select name="gender" class="form-select">
              <option value="">-- Chọn --</option>
              <option value="M" {% if candidate.gender == 'M' %}selected{% endif %}>Nam</option>
              <option value="F" {% if candidate.gender == 'F' %}selected{% endif %}>Nữ</option>
              <option value="O" {% if candidate.gender == 'O' %}selected{% endif %}>Khác</option>
            </select>
          </div>
        </div>
        <div class="mb-3">
          <label class="form-label">Số điện thoại</label>
          <input type="text" name="phone" class="form-control" value="{{ candidate.phone }}">
        </div>
        <div class="mb-3">
          <label class="form-label">Địa chỉ</label>
          <textarea name="address" class="form-control" rows="2">{{ candidate.address }}</textarea>
        </div>
        <div class="d-flex gap-3 mt-4">
          <button type="submit" class="btn-vc btn-primary-vc">
            <i class="bi bi-check2-circle"></i> Lưu thay đổi
          </button>
          <a href="{% url 'candidates:detail' candidate.pk %}" class="btn-vc btn-outline-vc">Hủy</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
